version: '3.8'

services:
    app:
        container_name: app
        build:
            dockerfile: .docker/php/Dockerfile
        restart: always
        volumes:
            - '.:/var/www/html'
        env_file:
            - .env
        depends_on:
            - db
            - redis
            - rabbitmq

    nginx:
        container_name: nginx
        image: nginx:alpine
        restart: always
        ports:
            - "8080:80"
        volumes:
            - '.:/var/www/html'
            - './.docker/nginx/conf.d:/etc/nginx/conf.d'
        depends_on:
            - app

    db:
        image: postgres:18
        container_name: db
        restart: always
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgresql_data:/var/lib/postgresql

    adminer:
        image: adminer
        container_name: adminer
        restart: always
        ports:
            - "9090:8080"
        depends_on:
            - db

    redis:
        image: redis:7-alpine
        container_name: redis
        restart: always
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data

    rabbitmq:
        image: rabbitmq:3-management
        container_name: rabbitmq
        restart: always
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq/

volumes:
    postgresql_data:
        driver: local
    redis_data:
        driver: local
    rabbitmq_data:
        driver: local